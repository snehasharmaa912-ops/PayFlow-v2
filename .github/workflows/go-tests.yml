name: Go Tests

on:
  push:
    paths:
      - "go/**"
      - ".github/workflows/go-tests.yml"
  pull_request:
    paths:
      - "go/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v -race
