name: Scala Tests

on:
  push:
    paths:
      - "scala/**"
      - ".github/workflows/scala-tests.yml"
  pull_request:
    paths:
      - "scala/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scala
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: sbt/setup-sbt@v1
      - run: sbt test
      - run: sbt assembly
